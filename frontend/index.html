<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Option Pro · 股票期权分析</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#6a1cf6',
              'primary-container': '#ede0ff',
              'on-primary': '#ffffff',
              'on-primary-container': '#24005b',
              secondary: '#4953ac',
              'secondary-container': '#dfe0ff',
              tertiary: '#006a28',
              'tertiary-container': '#72fea0',
              'on-tertiary-container': '#002108',
              error: '#b41340',
              'error-container': '#f74b6d',
              'on-error': '#ffefef',
              'on-error-container': '#510017',
              surface: '#f5f6fb',
              'surface-container-lowest': '#ffffff',
              'surface-container-low': '#eff1f6',
              'surface-container': '#e6e8ee',
              'surface-container-high': '#e0e2e9',
              'on-surface': '#2c2f33',
              'on-surface-variant': '#595c60',
              'outline-variant': '#abadb2',
              'inverse-surface': '#0c0e12',
            },
            fontFamily: {
              headline: ['Manrope', 'system-ui', 'sans-serif'],
              body: ['Inter', 'system-ui', 'sans-serif'],
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
            borderRadius: { '2xl': '1rem', '3xl': '1.5rem' },
          },
        },
      }
    </script>
    <script src="https://unpkg.com/lightweight-charts@4/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body>
    <div id="app-shell" class="min-h-screen">
      <header class="sticky top-0 z-50 glass-panel border-b border-white/60">
        <div class="h-16 px-4 md:px-8 flex items-center gap-5">
          <a href="#watchlist" class="flex items-center gap-3 shrink-0">
            <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-primary to-secondary text-white flex items-center justify-center shadow-lg shadow-primary/20">
              <span class="material-symbols-outlined">candlestick_chart</span>
            </div>
            <div>
              <p class="font-headline font-extrabold leading-tight tracking-tight">Option Pro</p>
              <p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">Signals & Options</p>
            </div>
          </a>
          <nav class="flex items-center gap-1 bg-surface-container-low rounded-full p-1 ml-auto md:ml-2">
            <a data-nav="watchlist" href="#watchlist" class="nav-link px-4 py-2 rounded-full text-xs font-bold transition-all">自选</a>
            <a data-nav="sectors" href="#sectors" class="nav-link px-4 py-2 rounded-full text-xs font-bold transition-all">板块</a>
            <a data-nav="earnings" href="#earnings" class="nav-link px-4 py-2 rounded-full text-xs font-bold transition-all">财报</a>
          </nav>
          <div id="global-search" class="hidden md:block w-80"></div>
        </div>
      </header>
      <div id="app" class="min-h-[calc(100vh-64px)]"></div>
    </div>
    <div id="modal-root"></div>
    <script type="module" src="/static/js/app.js"></script>
  </body>
</html>
