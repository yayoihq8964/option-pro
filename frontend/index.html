<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Optix Pro · Ethos Financial</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#000000',
            'on-primary': '#ffffff',
            surface: '#fbf9f8',
            'surface-dim': '#dbdad9',
            'surface-container-lowest': '#ffffff',
            'surface-container-low': '#f5f3f3',
            'surface-container': '#efeded',
            'surface-container-high': '#e9e8e7',
            'on-surface': '#1b1c1c',
            'on-surface-variant': '#444748',
            outline: '#747878',
            'outline-variant': '#c4c7c7',
            secondary: '#5e5e5d',
            error: '#ba1a1a',
            'error-container': '#ffdad6',
            'on-error-container': '#93000a',
            background: '#fbf9f8',
            emerald: '#059669',
            crimson: '#ba1a1a',
            border: '#E8E4E1',
            muted: '#444748',
            ink: '#1b1c1c',
            panel: '#ffffff'
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'SFMono-Regular', 'monospace']
          }
        }
      }
    };
  </script>

  <link rel="stylesheet" href="./static/css/styles.css" />
</head>
<body>
  <button id="sidebar-toggle" class="sidebar-toggle" type="button" aria-controls="sidebar" aria-expanded="false" aria-label="打开导航">
    <span></span><span></span><span></span>
  </button>
  <div id="sidebar-backdrop" class="sidebar-backdrop" hidden></div>

  <aside id="sidebar" class="sidebar app-sidebar">
    <a href="#watchlist" class="sidebar-logo" aria-label="Optix Pro 总览">
      <span class="logo-mark">O</span>
      <span class="logo-copy"><strong>Optix Pro</strong><small>Ethos Financial</small></span>
    </a>

    <div class="sidebar-search" role="search">
      <label class="sr-only" for="global-search">搜索股票</label>
      <input id="global-search" type="search" placeholder="搜索代码 / 公司" autocomplete="off" aria-autocomplete="list" aria-controls="global-search-results" aria-expanded="false" />
      <div id="global-search-results" class="search-results-dropdown" role="listbox" hidden></div>
    </div>

    <nav class="sidebar-nav" aria-label="主导航">
      <a class="sidebar-nav-item sidebar-link" href="#watchlist" data-route="watchlist"><span class="material-symbols-outlined" aria-hidden="true">dashboard</span><span class="sidebar-link-label">总览</span></a>
      <a class="sidebar-nav-item sidebar-link" href="#sectors" data-route="sectors"><span class="material-symbols-outlined" aria-hidden="true">layers</span><span class="sidebar-link-label">板块</span></a>
      <a class="sidebar-nav-item sidebar-link" href="#earnings" data-route="earnings"><span class="material-symbols-outlined" aria-hidden="true">event_note</span><span class="sidebar-link-label">财报</span></a>
    </nav>
  </aside>

  <div class="app-shell">
    <section class="ticker-bar" aria-label="市场指数">
      <div id="index-ticker-track" class="ticker-track"></div>
    </section>
    <main id="app" class="main-content" tabindex="-1" aria-live="polite"></main>
  </div>

  <div id="modal-root"></div>
  <script type="module" src="./static/js/app.js"></script>
</body>
</html>
