<!doctype html>
<html class="light" lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Optix Pro · Options Visualization</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              error: "#ba1a1a",
              "surface-container-high": "#dce9ff",
              "secondary-fixed-dim": "#4edea3",
              "on-tertiary-fixed-variant": "#891933",
              "primary-container": "#4338ca",
              "surface-variant": "#d3e4fe",
              "inverse-surface": "#213145",
              "on-surface": "#0b1c30",
              "on-tertiary-container": "#ffafb6",
              "on-primary-container": "#c1beff",
              surface: "#f8f9ff",
              "surface-container": "#e5eeff",
              "primary-fixed-dim": "#c3c0ff",
              "on-tertiary-fixed": "#400010",
              "on-primary-fixed": "#100069",
              "primary-fixed": "#e3dfff",
              "inverse-primary": "#c3c0ff",
              "on-secondary-container": "#00714d",
              "on-secondary-fixed": "#002113",
              "tertiary-fixed-dim": "#ffb2b9",
              "error-container": "#ffdad6",
              "surface-container-low": "#eff4ff",
              "on-surface-variant": "#464554",
              secondary: "#006c49",
              "surface-container-highest": "#d3e4fe",
              "on-primary": "#ffffff",
              "tertiary-container": "#97253d",
              tertiary: "#770927",
              "inverse-on-surface": "#eaf1ff",
              "on-background": "#0b1c30",
              "on-tertiary": "#ffffff",
              "on-error": "#ffffff",
              "secondary-fixed": "#6ffbbe",
              outline: "#777586",
              "tertiary-fixed": "#ffdadc",
              "surface-tint": "#5148d7",
              "on-secondary-fixed-variant": "#005236",
              "on-error-container": "#93000a",
              primary: "#2a14b4",
              "surface-dim": "#cbdbf5",
              "on-primary-fixed-variant": "#372abf",
              "secondary-container": "#6cf8bb",
              "outline-variant": "#c7c4d7",
              "surface-container-lowest": "#ffffff",
              background: "#f8f9ff",
              "on-secondary": "#ffffff",
              "surface-bright": "#f8f9ff",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              "margin-desktop": "32px",
              sm: "12px",
              lg: "24px",
              base: "4px",
              xl: "32px",
              md: "16px",
              gutter: "20px",
              "margin-mobile": "16px",
              xs: "8px",
            },
            fontFamily: {
              display: ["Inter"],
              "headline-md": ["Inter"],
              "body-md": ["Inter"],
              "data-mono": ["Inter"],
              "label-sm": ["Inter"],
              "headline-lg-mobile": ["Inter"],
              "headline-lg": ["Inter"],
              "body-lg": ["Inter"],
            },
            fontSize: {
              display: [
                "48px",
                {
                  lineHeight: "1.1",
                  letterSpacing: "-0.02em",
                  fontWeight: "700",
                },
              ],
              "headline-md": ["20px", { lineHeight: "1.3", fontWeight: "600" }],
              "body-md": ["14px", { lineHeight: "1.5", fontWeight: "400" }],
              "data-mono": ["14px", { lineHeight: "1", fontWeight: "500" }],
              "label-sm": [
                "12px",
                { lineHeight: "1", letterSpacing: "0.02em", fontWeight: "600" },
              ],
              "headline-lg-mobile": [
                "24px",
                { lineHeight: "1.2", fontWeight: "600" },
              ],
              "headline-lg": [
                "32px",
                {
                  lineHeight: "1.2",
                  letterSpacing: "-0.01em",
                  fontWeight: "600",
                },
              ],
              "body-lg": ["16px", { lineHeight: "1.6", fontWeight: "400" }],
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="./static/css/styles.css" />
  </head>
  <body
    class="font-body-md text-on-surface selection:bg-primary-container selection:text-on-primary-container"
  >
    <aside
      class="h-screen w-64 flex-col fixed left-0 top-0 bg-surface-container z-50 hidden md:flex"
    >
      <div class="flex flex-col h-full py-xl gap-md">
        <div class="px-xl mb-lg">
          <span class="font-display text-headline-md font-bold text-primary"
            >Optix Pro</span
          >
          <div class="flex items-center gap-xs mt-base">
            <div class="w-2 h-2 rounded-full bg-secondary animate-pulse"></div>
            <span
              class="font-label-sm text-on-surface-variant uppercase tracking-wider"
              >实时数据已激活</span
            >
          </div>
        </div>
        <nav id="sideNav" class="flex-1 px-md space-y-base"></nav>
      </div>
    </aside>
    <main class="md:ml-64 min-h-screen pb-24 md:pb-0">
      <header class="w-full sticky top-0 z-40 top-shell">
        <div
          class="flex items-center w-full px-margin-mobile md:px-margin-desktop py-sm max-w-[1920px] mx-auto"
        >
          <div
            class="relative w-full max-w-[560px] market-search rounded-xl flex items-center gap-md px-md py-xs transition-all"
            id="globalSearch"
          ></div>
          <div
            class="ml-auto hidden sm:flex items-center gap-sm text-label-sm text-on-surface-variant"
          >
            <span class="material-symbols-outlined text-secondary text-[18px]"
              >radio_button_checked</span
            ><span id="marketStatus">Market data live</span>
          </div>
        </div>
      </header>
      <div
        id="app"
        class="p-margin-mobile md:p-margin-desktop max-w-[1920px] mx-auto"
      ></div>
    </main>
    <nav
      id="mobileNav"
      class="md:hidden fixed bottom-0 left-0 right-0 bg-surface border-t border-outline-variant/20 px-xl py-sm flex justify-between items-center z-50"
    ></nav>
    <script src="https://unpkg.com/lightweight-charts@4/dist/lightweight-charts.standalone.production.js"></script>
    <script type="module" src="./static/js/app.js"></script>
  </body>
</html>
