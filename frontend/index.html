<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Optix Pro · Signal Desk</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#17202a',
            'on-primary': '#fffffc',
            surface: '#f6f8fb',
            'surface-dim': '#d9e0ea',
            'surface-container-lowest': '#fffffc',
            'surface-container-low': '#f0f5f7',
            'surface-container': '#e8eef2',
            'surface-container-high': '#dce6ec',
            'on-surface': '#17191f',
            'on-surface-variant': '#65717f',
            outline: '#8a97a4',
            'outline-variant': '#c7d2dd',
            secondary: '#2563eb',
            error: '#d84747',
            'error-container': '#ffe5e4',
            'on-error-container': '#8f1f28',
            background: '#f6f8fb',
            emerald: '#0f9f6e',
            crimson: '#d84747',
            border: '#dfe7ee',
            muted: '#65717f',
            ink: '#17191f',
            panel: '#fffffc'
          },
          fontFamily: {
            sans: ['Space Grotesk', 'Noto Sans SC', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'SFMono-Regular', 'monospace']
          }
        }
      }
    };
  </script>

  <link rel="stylesheet" href="./static/css/styles.css" />
</head>
<body>
  <button id="sidebar-toggle" class="sidebar-toggle" type="button" aria-controls="sidebar" aria-expanded="false" aria-label="打开导航">
    <span></span><span></span><span></span>
  </button>
  <div id="sidebar-backdrop" class="sidebar-backdrop" hidden></div>

  <aside id="sidebar" class="sidebar app-sidebar">
    <a href="#watchlist" class="sidebar-logo" aria-label="Optix Pro 总览">
      <span class="logo-mark">O</span>
      <span class="logo-copy"><strong>Optix Pro</strong><small>Signal Desk</small></span>
    </a>

    <div class="sidebar-search" role="search">
      <label class="sr-only" for="global-search">搜索股票</label>
      <input id="global-search" type="search" placeholder="搜索代码 / 公司" autocomplete="off" aria-autocomplete="list" aria-controls="global-search-results" aria-expanded="false" />
      <div id="global-search-results" class="search-results-dropdown" role="listbox" hidden></div>
    </div>

    <nav class="sidebar-nav" aria-label="主导航">
      <a class="sidebar-nav-item sidebar-link" href="#watchlist" data-route="watchlist"><span class="material-symbols-outlined" aria-hidden="true">dashboard</span><span class="sidebar-link-label">总览</span></a>
      <a class="sidebar-nav-item sidebar-link" href="#sectors" data-route="sectors"><span class="material-symbols-outlined" aria-hidden="true">layers</span><span class="sidebar-link-label">板块</span></a>
      <a class="sidebar-nav-item sidebar-link" href="#earnings" data-route="earnings"><span class="material-symbols-outlined" aria-hidden="true">event_note</span><span class="sidebar-link-label">财报</span></a>
    </nav>
  </aside>

  <div class="app-shell">
    <section class="ticker-bar" aria-label="市场指数">
      <div id="index-ticker-track" class="ticker-track"></div>
    </section>
    <main id="app" class="main-content" tabindex="-1" aria-live="polite"></main>
  </div>

  <div id="modal-root"></div>
  <script type="module" src="./static/js/app.js"></script>
</body>
</html>
