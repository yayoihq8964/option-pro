services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5.4-mini-2026-03-17}
      # low keeps signal/alert analysis <10s; xhigh routinely blew past the
      # API-side AI timeout and burned tokens for little gain.
      - OPENAI_REASONING=${OPENAI_REASONING:-low}
      - APP_AUTH_TOKEN=${APP_AUTH_TOKEN:-}
      - TRUST_PROXY_HEADERS=${TRUST_PROXY_HEADERS:-false}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
    ports:
      - "${HOST_BIND:-127.0.0.1}:${PORT:-2000}:8000"
    volumes:
      - ./frontend:/app/frontend:ro
    restart: unless-stopped
