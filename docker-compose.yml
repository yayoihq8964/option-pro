services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - MASSIVE_API_KEY=${MASSIVE_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./frontend:/app/frontend:ro
    restart: unless-stopped
